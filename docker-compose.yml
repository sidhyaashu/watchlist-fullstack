services:

  # ─── Shared Infrastructure ────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: investcode_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: investcode
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - investcode_net

  redis:
    image: redis:7-alpine
    container_name: investcode_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - investcode_net

  # ─── Auth Service ─────────────────────────────────────────────────
  auth_service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: auth_service
    restart: always
    # NOT exposed to host; only reachable via gateway inside docker network
    expose:
      - "8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/investcode
      - REDIS_URL=redis://investcode_redis:6379/0
      - BEHIND_GATEWAY=true   # Gateway owns CORS; auth service skips its own middleware
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - investcode_net

  # ─── Watchlist Service ────────────────────────────────────────────
  watchlist_service:
    build:
      context: ./watchlist_service
      dockerfile: Dockerfile
    container_name: watchlist_service
    restart: always
    # NOT exposed to host; only reachable via gateway inside docker network
    expose:
      - "8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/investcode
      - REDIS_URL=redis://investcode_redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - investcode_net

  # ─── API Gateway ──────────────────────────────────────────────────
  api_gateway:
    build:
      context: ./api_gateway_service
      dockerfile: docker/Dockerfile
    container_name: api_gateway
    restart: always
    expose:
      - "8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://investcode_redis:6379/0
      - AUTH_SERVICE_URL=http://auth_service:8000
      - WATCHLIST_SERVICE_URL=http://watchlist_service:8000
    depends_on:
      redis:
        condition: service_healthy
      auth_service:
        condition: service_healthy
      watchlist_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - investcode_net

  # ─── NGINX (Edge Proxy) ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: investcode_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./api_gateway_service/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api_gateway:
        condition: service_healthy
    networks:
      - investcode_net

  # ─── Client (Next.js) ─────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: investcode_client
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:80
    depends_on:
      - api_gateway
    networks:
      - investcode_net

# ─── Volumes & Networks ───────────────────────────────────────────
volumes:
  postgres_data:

networks:
  investcode_net:
    driver: bridge
